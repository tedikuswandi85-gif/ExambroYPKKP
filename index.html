<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exambro SMP YPKKP 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false" onselectstart="return false">

    <audio id="alert-sound" src="https://www.soundjay.com/buttons/beep-01a.mp3" preload="auto"></audio>

    <div id="times-up-overlay">
        <div class="warning-box">
            <h1 style="color:red; font-size: 30px;">WAKTU HABIS!</h1>
            <p>Akses soal telah ditutup otomatis oleh sistem.</p>
            <button onclick="location.reload()" class="btn-start">Kembali ke Menu</button>
        </div>
    </div>

    <div id="camera-feed" style="display: none;">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div id="auth-screen">
        <div class="login-box">
            <div class="header-exam">
                <img src="https://i.ibb.co.com/GfLt51Nk/logo.png" alt="Logo SMP YPKKP" class="logo-sekolah">
                <h2>Portal Ujian Resmi</h2>
                <h3>SMP YPKKP 2026</h3>
                <hr>
            </div>

            <div class="tab-menu">
                <button onclick="showTab('jadwal')" id="btn-tab-jadwal" class="active">Jadwal PSAJ</button>
                <button onclick="showTab('manual')" id="btn-tab-manual">Ulangan Harian</button>
            </div>

            <input type="text" id="siswa-nama" placeholder="Nama Lengkap Siswa">
            
            <div id="tab-jadwal">
                <select id="select-tingkat" onchange="filterMapel()">
                    <option value="">-- Pilih Tingkat Kelas --</option>
                    <option value="7">Kelas 7</option>
                    <option value="8">Kelas 8</option>
                    <option value="9">Kelas 9</option>
                </select>

                <select id="select-mapel">
                    <option value="">-- Pilih Mata Pelajaran --</option>
                </select>

                <input type="text" id="psaj-token" placeholder="Masukkan Token (Dari Pengawas)" style="text-transform: uppercase;">
                <button onclick="startExam('jadwal')" class="btn-start">MULAI UJIAN PSAJ</button>
            </div>

            <div id="tab-manual" style="display:none;">
                <input type="text" id="manual-url" placeholder="Tempel Link Soal Di Sini">
                <input type="number" id="manual-timer" placeholder="Durasi (Menit)">
                <button onclick="startExam('manual')" class="btn-start" style="background: #28a745;">MULAI ULANGAN</button>
            </div>
        </div>
    </div>

    <div id="exam-header" style="display: none;">
        <div class="status-bar">
            <div>
                <b id="display-nama">Siswa</b><br>
                <small id="display-mapel">Mapel</small>
            </div>
            <div id="timer-box">Sisa: <b id="timer-display">00:00</b></div>
            <button onclick="exitApp()" class="btn-exit">SELESAI</button>
        </div>
        <iframe id="exam-frame" src=""></iframe>
    </div>

    <div id="warning-overlay">
        <div class="warning-box">
            <h2 style="color:red;">PELANGGARAN!</h2>
            <p id="violation-msg">Dilarang keluar dari aplikasi!</p>
            <button onclick="returnToFullscreen()" class="btn-start">KEMBALI KE UJIAN</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
